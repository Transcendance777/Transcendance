global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # - job_name: cadvisor  # incompatible Podman rootless
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
