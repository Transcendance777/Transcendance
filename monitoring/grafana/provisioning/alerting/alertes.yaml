apiVersion: 1

groups:
  - orgId: 1
    name: "Alertes Gamerev"
    folder: "supervision"
    interval: 30s
    rules:

      # --- ALERTE 1 : SERVICE DOWN ---
      # "1 - up" donne 1 quand le service est down (up=0), 0 quand il est up
      # classic_conditions évalue chaque série (instance) indépendamment → labels conservés
      - uid: alerte_service_down
        title: "Service indisponible"
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: 1 - up
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Le service {{ $labels.instance }} est DOWN"
        labels:
          severity: critical

