      # --- ALERTE 3 : CONNEXIONS DB > 100 ---
      - uid: alert_db_connections
        title: "Trop de connexions PostgreSQL"
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: sum(pg_stat_activity_count) by (instance)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params: [100]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Limite de connexions atteinte sur {{ $labels.instance }}"
          description: "Plus de 100 connexions actives sur la DB {{ $labels.instance }}"
        labels:
          severity: warning

