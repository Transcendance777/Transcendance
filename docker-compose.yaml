# Commenter les ports une fois en production pour reduire les risques d'attaques
# et faire le nginx.conf pour faire le reverse proxy

services:
  frontend:
    build: front
    networks:
      - gamerev

  backend:
    build: backend
    networks:
      - gamerev
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.4-alpine
    volumes:
      - postgre-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - gamerev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"   #Reste ouvert pour la redirection HTTP
      - "443:443" #Reste ouvert pour la redirection HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs # copier les certificats dans le container
    depends_on:
      - frontend
      - backend
    networks:
      - gamerev


networks:
  gamerev:
    driver: bridge

volumes:
  postgre-data:
    driver: local
