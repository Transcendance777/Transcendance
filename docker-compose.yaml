# Commenter les ports une fois en production pour reduire les risques d'attaques
# et faire le nginx.conf pour faire le reverse proxy

services:
  frontend:
    build: front
    networks:
      - gamerev

  backend:
    build: backend
    networks:
      - gamerev
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.4-alpine
    volumes:
      - postgre-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - gamerev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 60s

  waf:
    build: waf
    container_name: waf
    env_file:
      - .env
    environment:
      - BACKEND=${WAF_BACKEND}
      - MODSEC_RULE_ENGINE=${WAF_RULE_ENGINE}
      - PARANOIA=${WAF_PARANOIA}
      - ANOMALY_INBOUND=${WAF_ANOMALY_INBOUND}
      - ANOMALY_OUTBOUND=${WAF_ANOMALY_OUTBOUND}
      - BLOCKING_PARANOIA=${WAF_BLOCKING_PARANOIA}
      - MODSEC_AUDIT_LOG=/var/log/modsec_audit.log
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      - PROXY_SSL=${PROXY_SSL}
      - PROXY_SSL_CERT=${PROXY_SSL_CERT}
      - PROXY_SSL_CERT_KEY=${PROXY_SSL_CERT_KEY}
      - SSL_PORT=${WAF_SSL_PORT}
      - PORT=${WAF_PORT}
      - TIMEOUT=${WAF_TIMEOUT}
      - DNS_SERVER=${WAF_DNS_SERVER}
    ports:
      - "8080:8080"   # HTTP (redirect vers HTTPS géré par le WAF)
      - "8443:8443"   # HTTPS
    volumes:
      - ./waf/certs:/etc/waf/certs:ro
    depends_on:
      - nginx
    networks:
      - gamerev

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gamerev

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - gamerev


  grafana:
    container_name: grafana
    image: grafana/grafana:12.4
    env_file:
      - .env
    networks:
      - gamerev
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/${DB_NAME}?sslmode=disable"
      DATA_SOURCE_USER: ${DB_USER}
      DATA_SOURCE_PASS: ${DB_PASS}
    networks:
      - gamerev
    depends_on:
      postgres:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    command:
      - "--nginx.scrape-uri=http://nginx:8080/stub_status"
    networks:
      - gamerev
    depends_on:
      - nginx

networks:
  gamerev:
    driver: bridge

volumes:
  postgre-data:
    driver: local
  grafana-data:
    driver: local
