# Commenter les ports une fois en production pour reduire les risques d'attaques
# et faire le nginx.conf pour faire le reverse proxy

services:
  frontend:
    build: front
    networks:
      - gamerev

  backend:
    build: backend
    networks:
      - gamerev
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.4-alpine
    volumes:
      - postgre-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - gamerev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"   #Reste ouvert pour la redirection HTTP
      - "443:443" #Reste ouvert pour la redirection HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs # copier les certificats dans le container
    depends_on:
      - frontend
      - backend
    networks:
      - gamerev

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - gamerev
    depends_on:
      - cadvisor

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    ports:
      - "9091:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - gamerev

  grafana:
    container_name: grafana
    image: grafana/grafana:12.4
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - gamerev
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

    # postgres-exporter:
    #   image: prometheuscommunity/postgres-exporter:v0
    #   container_name: postgres-exporter
    #   networks:
    #     - gamerev

networks:
  gamerev:
    driver: bridge

volumes:
  postgre-data:
    driver: local
  grafana-data:
    driver: local
