# ============================================================
# Custom WAF Rules - Game REV
# ============================================================

# --- Avatar upload: base64 data-URI false positive on XSS data-URI rules ---
SecRule REQUEST_URI "@streq /api/user/avatar" \
    "id:100025,phase:1,pass,nolog,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941170"

# --- Whitelist OAuth redirect (token in URL) ---
SecRule REQUEST_URI "@beginsWith /home" \
    "id:100021,phase:1,pass,nolog,ctl:ruleRemoveById=949110"

# --- Whitelist Google OAuth callback ---
SecRule REQUEST_URI "@beginsWith /api/auth/google/callback" \
    "id:100019,phase:1,pass,nolog,ctl:ruleEngine=DetectionOnly"

# --- HTTP Method Whitelist ---
SecRule REQUEST_METHOD "!@rx ^(GET|POST|HEAD|PUT|DELETE|PATCH)$" \
    "id:100016,phase:1,deny,status:405,log,msg:'Method not allowed'"

# --- SQL Injection ---
SecRule ARGS "@rx (?i)(union\s+select|information_schema|sleep\s*\(|benchmark\s*\(|order\s+by|drop\s+table|insert\s+into|update\s+set|delete\s+from|group\s+by\s+\d)" \
    "id:100001,phase:2,deny,status:403,log,msg:'SQLi attempt'"

# --- XSS ---
SecRule ARGS "@rx (?i)(<script|javascript:|onerror=|onload=|onmouseover=|onfocus=|<iframe|<svg.*onload|data:text/html)" \
    "id:100002,phase:2,deny,status:403,log,msg:'XSS attempt'"

# --- LFI/RFI ---
SecRule ARGS "@rx (\.\./|\.\.\\|/etc/passwd|/etc/shadow|php://|expect://|data://|zip://)" \
    "id:100003,phase:2,deny,status:403,log,msg:'LFI/RFI attempt'"

# --- Command Injection ---
SecRule ARGS "@rx (?i)(\$\(|`.*`|;\s*(wget|curl|bash|sh|python|perl|nc|ncat)|&&|\|\||\|.*bash)" \
    "id:100004,phase:2,deny,status:403,log,msg:'Command injection'"

# --- File Upload (extension) ---
SecRule FILES_NAMES "@rx (?i)\.(php\d?|phtml|jsp|aspx|exe|sh|py|pl|cgi)$" \
    "id:100006,phase:2,deny,status:403,log,msg:'Dangerous file upload'"

# --- Admin Panel (whitelist IP) ---
SecRule REQUEST_URI "@beginsWith /admin" \
    "id:100007,phase:1,chain,deny,status:403,log,msg:'Admin access blocked'"
    SecRule REMOTE_ADDR "!@ipMatch 127.0.0.1,10.0.0.0/8,192.168.0.0/16"

# --- Rate Limiting (login bruteforce) ---
SecAction \
    "id:100010,phase:1,nolog,pass,\
    initcol:ip=%{REMOTE_ADDR}"

SecRule REQUEST_URI "@beginsWith /api/auth/login" \
    "id:100011,phase:1,pass,nolog,\
    setvar:ip.login_count=+1,\
    expirevar:ip.login_count=60"

SecRule IP:LOGIN_COUNT "@gt 10" \
    "id:100012,phase:1,deny,status:429,log,msg:'Brute force login'"

# --- Rate Limiting (review spam) ---
SecRule REQUEST_URI "@beginsWith /api/user/review" \
    "id:100013,phase:1,pass,nolog,\
    setvar:ip.review_count=+1,\
    expirevar:ip.review_count=3600"

SecRule IP:REVIEW_COUNT "@gt 20" \
    "id:100014,phase:1,deny,status:429,log,msg:'Review spam'"

# --- Scanner/Bot Detection ---
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|masscan|zgrab|nuclei|dirbuster|gobuster)" \
    "id:100015,phase:1,deny,status:403,log,msg:'Scanner detected'"

# --- Grafana whitelist ---
SecRule REQUEST_URI "@beginsWith /grafana/" \
    "id:100017,phase:1,pass,nolog,ctl:ruleRemoveById=959100,ctl:ruleRemoveById=949110"

# --- Prometheus whitelist ---
SecRule REQUEST_URI "@beginsWith /prometheus/" \
    "id:100023,phase:1,pass,nolog,ctl:ruleRemoveById=959100,ctl:ruleRemoveById=949110"

# --- Grafana datasource API ---
SecRule REQUEST_URI "@beginsWith /grafana/api/ds" \
    "id:100018,phase:1,pass,nolog,ctl:requestBodyAccess=Off"
