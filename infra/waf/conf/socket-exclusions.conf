# Allow REST methods used by the API (default CRS only allows GET HEAD POST
# OPTIONS). Must run before REQUEST-901-INITIALIZATION.conf sets its default,
# so DELETE/PUT/PATCH never trigger rule 911100 and we don't have to disable
# the blocking rule (949110) on /api/ to compensate.
SecAction \
    "id:100024,phase:1,nolog,pass,t:none,\
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# Socket.IO can fall back to Engine.IO HTTP long-polling. Its POST requests use
# text/plain, which CRS rule 920420 rejects by default. Remove only that rule
# for this exact endpoint, method and content type.
SecRule REQUEST_URI "@beginsWith /socket.io/" \
    "id:100022,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    chain"
    SecRule REQUEST_METHOD "@streq POST" \
        "t:none,\
        chain"
        SecRule REQUEST_HEADERS:Content-Type "@beginsWith text/plain" \
            "t:none,\
            ctl:ruleRemoveById=920420"
