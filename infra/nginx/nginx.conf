# nginx interne uniquement — SSL terminé par le WAF en amont

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {					# permet de recuperer les infos pour monitorer
    listen 8080;
    location /stub_status {
        stub_status;
    }
}

server {
    listen 80;
    server_name localhost;

    absolute_redirect off;

    location /api/ {
        proxy_pass http://backend:4000;
    }

    location /api-docs {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering off;
    }

    location = /grafana {
        return 301 /grafana/;
    }

	location = /prometheus {
		return 301 /prometheus/;
	}

	location /prometheus/ {
		proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # permet d'assurer que la requete initiale etait securisée
	}

    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # permet d'assurer que la requete initiale etait securisée
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
		proxy_set_header Accept-Encoding "";
    }

    location / {
        proxy_pass http://frontend:80;
    }
}

