# nginx interne uniquement — SSL terminé par le WAF en amont

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# anti-bruteforce login / reset password -> 10 requêtes immédiates par IP, puis 1/min
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/m;

server {					# permet de recuperer les infos pour monitorer
    listen 8080;
    location /stub_status {
        stub_status;
    }
}

server {
    listen 443 ssl;
    server_name localhost;
	ssl_certificate		/certs/nginx.crt;
	ssl_certificate_key		/certs/nginx.key;
    absolute_redirect off;

    location /api/ {
        proxy_pass https://backend:4000;
		proxy_ssl_verify off;
    }

    location ~ ^/api/auth/(login|forgot-password|verify-code|reset-password)$ {
        limit_req zone=auth_limit burst=9 nodelay;
        limit_req_status 429;
        proxy_pass https://backend:4000;
        proxy_ssl_verify off;
    }

    location /api-docs {
        proxy_pass https://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
		proxy_ssl_verify off;
    }

    location /socket.io/ {
        proxy_pass https://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering off;
		proxy_ssl_verify off;
    }

    location = /grafana {
        return 301 /grafana/;
    }

	location = /prometheus {
		return 301 /prometheus/;
	}

	location /prometheus/ {
		proxy_pass https://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # permet d'assurer que la requete initiale etait securisée
		proxy_ssl_verify off;
	}

    location /grafana/ {
        proxy_pass https://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # permet d'assurer que la requete initiale etait securisée
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
		proxy_set_header Accept-Encoding "";
		proxy_ssl_verify off;
    }

    location / {
        proxy_pass http://frontend:80;
    }
}

