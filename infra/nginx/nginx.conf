# nginx interne uniquement — SSL terminé par le WAF en amont

server {					# permet de recuperer les infos pour monitorer
    listen 8080;
    location /stub_status {
        stub_status;
    }
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://backend:4000;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # permet d'assurer que la requete initiale etait securisée
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
		proxy_set_header Accept-Encoding "";
    }

    location / {
        proxy_pass http://frontend:80;
    }
}


